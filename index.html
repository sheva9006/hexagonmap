<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tide Hexagon Simulator v26.0 (Dynamic Capacity)</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .info-panel { font-size: 18px; margin-bottom: 15px; color: #aaa; display: flex; justify-content: center; align-items: center; gap: 12px; flex-wrap: wrap; }
        
        .btn {
            color: white; border: none; padding: 10px 16px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s;
        }
        .phase-btn { background: #2980b9; box-shadow: 0 0 10px rgba(41, 128, 185, 0.5); }
        .phase-btn:hover { background: #3498db; }
        .phase-sim { background: #d35400 !important; box-shadow: 0 0 10px rgba(211, 84, 0, 0.5); }
        
        .reset-btn { background: #e74c3c; }
        .reset-btn:hover { background: #c0392b; }
        
        .tool-btn { background: #444; border: 1px solid #666; padding: 8px 14px; font-size: 13px; }
        .tool-btn:hover { background: #555; }
        .tool-active { background: #f39c12 !important; color: black; box-shadow: 0 0 8px #f39c12; }
        .live-active-plus { background: #2ecc71 !important; color: black; box-shadow: 0 0 8px #2ecc71; }
        .live-active-minus { background: #e74c3c !important; color: white; box-shadow: 0 0 8px #e74c3c; }

        #mainCanvas { 
            background: #1a1a1a; 
            border: 2px solid #333; 
            border-radius: 12px; 
            margin-top: 10px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: inline-block;
        }
        .legend-area { display: flex; justify-content: center; gap: 15px; margin-top: 20px; font-size: 14px; }
        .leg-item { display: flex; align-items: center; gap: 5px; }
        .leg-box { width: 15px; height: 15px; border-radius: 3px; }
        .status-txt { font-weight: bold; color: #00e5ff; }
    </style>
</head>
<body>

    <div class="info-panel">
        <div>Turn: <span id="turn_val" style="color:white; font-weight:bold;">1</span></div>
        <div>Mode: <span id="status_val" class="status-txt">SETUP (Assign Energy)</span></div>
        
        <button id="phase_toggle_btn" class="btn phase-btn">▶ Switch to Simulation Phase</button>
        
        <button id="cap_tool_btn" class="btn tool-btn">⚙️ Set Max Energy (Cap)</button>
        <button id="live_plus_btn" class="btn tool-btn">➕ Live +1</button>
        <button id="live_minus_btn" class="btn tool-btn">➖ Live -1</button>
        
        <button id="reset_btn" class="reset-btn btn">🔄 Reset</button>
    </div>
    
    <h2>Tide Simulator v26.0 (Dynamic Node Capacity)</h2>
    
    <canvas id="mainCanvas" width="600" height="320"></canvas>
    
    <p style="color:#aaa;" id="helper_txt">💡 <b>Usage:</b> Click to cycle energy. Use "Set Max Energy" tool to change cell capacities dynamically!</p>

    <div class="legend-area">
        <div class="leg-item"><div class="leg-box" style="background:#1e1e1e; border:1px solid #333;"></div> Empty</div>
        <div class="leg-item"><div class="leg-box" style="background:#2ecc71"></div> [3] Safe</div>
        <div class="leg-item"><div class="leg-box" style="background:#f1c40f"></div> [2] Stable</div>
        <div class="leg-item"><div class="leg-box" style="background:#e74c3c"></div> [1] Critical</div>
        <div class="leg-item"><div class="leg-box" style="background:#34495e"></div> [0] Collapsed</div>
        <div class="leg-item"><div class="leg-box" style="background:#0a0a0a; border:1px dashed #555;"></div> [B] Block</div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        let turn = 1;
        const globalRadius = 42; 
        let isSimulationPhase = false; 
        let activeTool = "none"; // "none", "capacity", "plus", "minus"

        const colors = { 
            "null": '#1e1e1e', "-1": '#0a0a0a',
            "3": '#2ecc71', "2": '#f1c40f', "1": '#e74c3c', "0": '#34495e' 
        };
        const textColors = { "3": '#000', "2": '#000', "1": '#fff', "0": '#fff', "-1": '#888' };
        
        let nodes = [];
        let savedSnapshot = []; 

        function initEmptyMap() {
            nodes = [];
            for (let i = 0; i < 18; i++) {
                nodes.push({ energy: null, yon: 0, maxEnergy: 3 }); 
            }
            savedSnapshot = [];
        }

        function updateUI() {
            document.getElementById('cap_tool_btn').className = "btn tool-btn" + (activeTool === "capacity" ? " tool-active" : "");
            document.getElementById('live_plus_btn').className = "btn tool-btn" + (activeTool === "plus" ? " live-active-plus" : "");
            document.getElementById('live_minus_btn').className = "btn tool-btn" + (activeTool === "minus" ? " live-active-minus" : "");

            const phaseBtn = document.getElementById('phase_toggle_btn');
            const statusEl = document.getElementById('status_val');
            const helperEl = document.getElementById('helper_txt');

            if (isSimulationPhase) {
                if (phaseBtn) { phaseBtn.innerText = "🛠 Return to Setup Phase (Reset)"; phaseBtn.classList.add('phase-sim'); }
                if (statusEl) { statusEl.innerText = "SIMULATION PHASE (Step Mode)"; statusEl.style.color = "#ff9100"; }
                if (helperEl) { helperEl.innerHTML = "🏃‍♂️ <b>Player's Turn:</b> Clicked cell stays stable. Others fluctuate based on their individual Max Capacity."; }
            } else {
                if (phaseBtn) { phaseBtn.innerText = "▶ Switch to Simulation Phase"; phaseBtn.classList.remove('phase-sim'); }
                if (statusEl) { statusEl.innerText = "SETUP (Assign Energy)"; statusEl.style.color = "#00e5ff"; }
                if (helperEl) { 
                    if(activeTool === "capacity") {
                        helperEl.innerHTML = "⚙️ <b>Capacity Tool Active:</b> Click nodes to cycle their Max Capacity limit (1 → 2 → 3).";
                    } else {
                        helperEl.innerHTML = "💡 <b>Usage:</b> Click cells to cycle energy. Use 'Set Max Energy' to customize node limits.";
                    }
                }
            }
        }

        function getCenter(col, row) {
            const w = globalRadius * Math.sqrt(3);
            const h = globalRadius * 2;
            let x = 90 + col * w;
            if (row % 2 === 1) x += w / 2;
            const y = 70 + row * (h * 3/4);
            return { x, y };
        }

        function drawHexAndBorder(x, y, node) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i + (Math.PI / 6);
                const hX = x + globalRadius * Math.cos(angle);
                const hY = y + globalRadius * Math.sin(angle);
                if (i === 0) ctx.moveTo(hX, hY);
                else ctx.lineTo(hX, hY);
            }
            ctx.closePath();

            let fillKey = node.energy === null ? "null" : String(node.energy);
            ctx.fillStyle = colors[fillKey] || colors["null"];
            ctx.fill();

            // Kapasiteye göre dış çizgi kalınlığı
            ctx.strokeStyle = '#333';
            ctx.lineWidth = node.maxEnergy === 3 ? 3 : (node.maxEnergy === 2 ? 1.5 : 0.5);
            ctx.setLineDash([]);
            
            if (isSimulationPhase && node.energy !== null && node.energy !== -1) {
                if (node.yon === 1) { ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 3; ctx.setLineDash([4, 4]); }
                else if (node.yon === -1) { ctx.strokeStyle = '#ff9100'; ctx.lineWidth = 3; ctx.setLineDash([4, 4]); }
            }
            ctx.stroke();

            // Kapasite Belirteci (Küçük kılavuz noktalar/metin)
            if (node.energy !== null && node.energy !== -1) {
                ctx.font = '9px sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fillText(`max:${node.maxEnergy}`, x, y + 14);
            }

            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (node.energy === -1) {
                ctx.fillStyle = textColors["-1"];
                ctx.fillText("B", x, y);
            } else if (node.energy !== null) {
                ctx.fillStyle = textColors[String(node.energy)] || '#fff';
                ctx.fillText(node.energy, x, y - 2);
            }
        }

        function renderMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    const idx = row * 6 + col;
                    if (nodes[idx]) {
                        const coords = getCenter(col, row);
                        drawHexAndBorder(coords.x, coords.y, nodes[idx]);
                    }
                }
            }
            const turnValEl = document.getElementById('turn_val');
            if (turnValEl) turnValEl.innerText = turn;
        }

        function advanceTurn(steppedNodeIndex) {
            turn++;
            for (let i = 0; i < nodes.length; i++) {
                let node = nodes[i];
                if (node.energy === null || node.energy === -1) continue;
                if (i === steppedNodeIndex) continue; 

                node.energy += node.yon;
                // ARTIK SINIR SABİT 3 DEĞİL, NODE'UN KENDİ maxEnergy DEĞERİ!
                if (node.energy >= node.maxEnergy) { 
                    node.energy = node.maxEnergy; 
                    node.yon = -1; 
                }
                else if (node.energy <= 0) { 
                    node.energy = 0; 
                    node.yon = 1; 
                }
            }
            renderMap();
        }

        function resetSimulation() {
            turn = 1;
            isSimulationPhase = false;
            activeTool = "none";
            initEmptyMap();
            updateUI();
            renderMap();
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mY = (e.clientY - rect.top) * (canvas.height / rect.height);

            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    const coords = getCenter(col, row);
                    if (Math.hypot(mX - coords.x, mY - coords.y) < globalRadius * 0.85) {
                        const idx = row * 6 + col;
                        if (!nodes[idx]) return;

                        // 1. KAPASİTE AYARLAMA ARACI AKTİFSE
                        if (activeTool === "capacity" && !isSimulationPhase) {
                            node = nodes[idx];
                            node.maxEnergy = node.maxEnergy === 3 ? 1 : node.maxEnergy + 1;
                            if (node.energy !== null && node.energy > node.maxEnergy) {
                                node.energy = node.maxEnergy;
                            }
                            renderMap();
                            return;
                        }

                        // 2. LIVE CANLI DEĞİŞTİRME ARAÇLARI
                        if (activeTool === "plus" && nodes[idx].energy !== null && nodes[idx].energy !== -1) {
                            nodes[idx].energy = Math.min(nodes[idx].maxEnergy, nodes[idx].energy + 1);
                            if (nodes[idx].energy === nodes[idx].maxEnergy) nodes[idx].yon = -1;
                            renderMap(); return;
                        } else if (activeTool === "minus" && nodes[idx].energy !== null && nodes[idx].energy !== -1) {
                            nodes[idx].energy = Math.max(0, nodes[idx].energy - 1);
                            if (nodes[idx].energy === 0) nodes[idx].yon = 1;
                            renderMap(); return;
                        }

                        // 3. SİMÜLASYON FAZI TIKLAMASI
                        if (isSimulationPhase && activeTool === "none") {
                            if (nodes[idx].energy !== null && nodes[idx].energy !== -1) {
                                advanceTurn(idx); 
                            }
                            return;
                        }

                        // 4. KLASİK KURULUM FAZI TIKLAMASI (Dinamik Sınıra Göre Döngü)
                        if (!isSimulationPhase && activeTool === "none") {
                            let n = nodes[idx];
                            if (n.energy === null) { n.energy = 0; n.yon = 1; }
                            else if (n.energy < n.maxEnergy && n.energy >= 0) { 
                                n.energy++; 
                                n.yon = (n.energy === n.maxEnergy) ? -1 : n.yon;
                            }
                            else if (n.energy === n.maxEnergy) { n.energy = -1; n.yon = 0; }
                            else if (n.energy === -1) { n.energy = null; n.yon = 0; }
                            renderMap();
                        }
                        return;
                    }
                }
            }
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        document.getElementById('phase_toggle_btn').addEventListener('click', () => {
            if (!isSimulationPhase) {
                savedSnapshot = nodes.map(n => ({ energy: n.energy, yon: n.yon, maxEnergy: n.maxEnergy }));
                isSimulationPhase = true;
                activeTool = "none";
            } else {
                if (savedSnapshot.length > 0) {
                    nodes = savedSnapshot.map(n => ({ energy: n.energy, yon: n.yon, maxEnergy: n.maxEnergy }));
                }
                turn = 1; isSimulationPhase = false;
            }
            updateUI(); renderMap();
        });

        document.getElementById('cap_tool_btn').addEventListener('click', () => {
            if(isSimulationPhase) return;
            activeTool = (activeTool === "capacity") ? "none" : "capacity";
            updateUI();
        });

        document.getElementById('live_plus_btn').addEventListener('click', () => {
            activeTool = (activeTool === "plus") ? "none" : "plus";
            updateUI();
        });

        document.getElementById('live_minus_btn').addEventListener('click', () => {
            activeTool = (activeTool === "minus") ? "none" : "minus";
            updateUI();
        });

        document.getElementById('reset_btn').addEventListener('click', resetSimulation);
        resetSimulation();
    </script>
</body>
</html>
