<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gel-Git Hexagon Simulator v24.0 (Absolute Render)</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .info-panel { font-size: 18px; margin-bottom: 15px; color: #aaa; display: flex; justify-content: center; align-items: center; gap: 12px; flex-wrap: wrap; }
        
        .btn {
            color: white; border: none; padding: 10px 16px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s;
        }
        .phase-btn { background: #2980b9; box-shadow: 0 0 10px rgba(41, 128, 185, 0.5); }
        .phase-btn:hover { background: #3498db; }
        .phase-sim { background: #d35400 !important; box-shadow: 0 0 10px rgba(211, 84, 0, 0.5); }
        
        .reset-btn { background: #e74c3c; }
        .reset-btn:hover { background: #c0392b; }
        
        .live-btn { background: #555; border: 1px solid #777; padding: 8px 14px; font-size: 13px; }
        .live-btn:hover { background: #666; }
        .live-active-plus { background: #2ecc71 !important; color: black; box-shadow: 0 0 8px #2ecc71; }
        .live-active-minus { background: #e74c3c !important; color: white; box-shadow: 0 0 8px #e74c3c; }

        #mainCanvas { 
            background: #1a1a1a; 
            border: 2px solid #333; 
            border-radius: 12px; 
            margin-top: 10px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: inline-block;
        }
        .legend-area { display: flex; justify-content: center; gap: 15px; margin-top: 20px; font-size: 14px; }
        .leg-item { display: flex; align-items: center; gap: 5px; }
        .leg-box { width: 15px; height: 15px; border-radius: 3px; }
        .status-txt { font-weight: bold; color: #00e5ff; }
    </style>
</head>
<body>

    <div class="info-panel">
        <div>Turn: <span id="turn_val" style="color:white; font-weight:bold;">1</span></div>
        <div>Mod: <span id="status_val" class="status-txt">KURULUM (Enerji Atama)</span></div>
        
        <button id="phase_toggle_btn" class="btn phase-btn">▶ Simülasyon Fazına Geç</button>
        
        <button id="live_plus_btn" class="btn live-btn">➕ Canlı +1</button>
        <button id="live_minus_btn" class="btn live-btn">➖ Canlı -1</button>
        
        <button id="reset_btn" class="reset-btn btn">🔄 Sıfırla</button>
    </div>
    
    <h2>Gel-Git Simulator v24.0 (Ömürlük Render Garantisi)</h2>
    
    <canvas id="mainCanvas" width="600" height="320"></canvas>
    
    <p style="color:#aaa;" id="helper_txt">💡 <b>Kullanım:</b> Hücrelere tıklayarak eski usul sırayla enerjileri (0-3) veya engeli (B) yerleştir.</p>

    <div class="legend-area">
        <div class="leg-item"><div class="leg-box" style="background:#1e1e1e; border:1px solid #333;"></div> Boş Alan</div>
        <div class="leg-item"><div class="leg-box" style="background:#2ecc71"></div> [3] Güvenli</div>
        <div class="leg-item"><div class="leg-box" style="background:#f1c40f"></div> [2] Stabil</div>
        <div class="leg-item"><div class="leg-box" style="background:#e74c3c"></div> [1] Kritik</div>
        <div class="leg-item"><div class="leg-box" style="background:#34495e"></div> [0] Çökmüş</div>
        <div class="leg-item"><div class="leg-box" style="background:#0a0a0a; border:1px dashed #555;"></div> [B] Block / Engel</div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        let turn = 1;
        // Çizim yarıçapı (r) global olarak kesinleştirildi
        const globalRadius = 42; 
        let isSimulationPhase = false; 
        let activeLiveTool = "none"; 

        const colors = { 
            "null": '#1e1e1e', "-1": '#0a0a0a',
            "3": '#2ecc71', "2": '#f1c40f', "1": '#e74c3c', "0": '#34495e' 
        };
        const textColors = { "3": '#000', "2": '#000', "1": '#fff', "0": '#fff', "-1": '#888' };
        let nodes = [];

        function initEmptyMap() {
            nodes = [];
            for (let i = 0; i < 18; i++) {
                nodes.push({ energy: null, yon: 0 }); 
            }
        }

        function updateUI() {
            const btnPlus = document.getElementById('live_plus_btn');
            const btnMinus = document.getElementById('live_minus_btn');
            if (btnPlus) btnPlus.className = "btn live-btn" + (activeLiveTool === "plus" ? " live-active-plus" : "");
            if (btnMinus) btnMinus.className = "btn live-btn" + (activeLiveTool === "minus" ? " live-active-minus" : "");

            const phaseBtn = document.getElementById('phase_toggle_btn');
            const statusEl = document.getElementById('status_val');
            const helperEl = document.getElementById('helper_txt');

            if (isSimulationPhase) {
                if (phaseBtn) {
                    phaseBtn.innerText = "🛠 Kurulum Fazına Dön";
                    phaseBtn.classList.add('phase-sim');
                }
                if (statusEl) {
                    statusEl.innerText = "SİMÜLASYON FAZI (Adım Atma)";
                    statusEl.style.color = "#ff9100";
                }
                if (helperEl) {
                    helperEl.innerHTML = "🏃‍♂️ <b>Sıra Oyuncuda:</b> Haritada bastığın hücre sabit kalır, diğer tüm hücreler dalgalanır ve turn ilerler.";
                }
            } else {
                if (phaseBtn) {
                    phaseBtn.innerText = "▶ Simülasyon Fazına Geç";
                    phaseBtn.classList.remove('phase-sim');
                }
                if (statusEl) {
                    statusEl.innerText = "KURULUM (Enerji Atama)";
                    statusEl.style.color = "#00e5ff";
                }
                if (helperEl) {
                    helperEl.innerHTML = "💡 <b>Kullanım:</b> Hücrelere tıklayarak eski usul sırayla enerjileri (0-3) veya engeli (B) yerleştir.";
                }
            }
        }

        function getCenter(col, row) {
            const w = globalRadius * Math.sqrt(3);
            const h = globalRadius * 2;
            let x = 90 + col * w;
            if (row % 2 === 1) x += w / 2;
            const y = 70 + row * (h * 3/4);
            return { x, y };
        }

        function drawHexAndBorder(x, y, node) {
            // 1. İÇ DOLGU ÇİZİMİ
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i + (Math.PI / 6);
                const hX = x + globalRadius * Math.cos(angle);
                const hY = y + globalRadius * Math.sin(angle);
                if (i === 0) ctx.moveTo(hX, hY);
                else ctx.lineTo(hX, hY);
            }
            ctx.closePath();

            let fillKey = node.energy === null ? "null" : String(node.energy);
            ctx.fillStyle = colors[fillKey] || colors["null"];
            ctx.fill();

            // 2. DIŞ BORDER ÇİZİMİ (Garantiye Alındı)
            ctx.strokeStyle = '#333'; 
            ctx.lineWidth = 2; 
            ctx.setLineDash([]);
            
            // Eğer simülasyondaysa yön çizgilerini göster
            if (isSimulationPhase && node.energy !== null && node.energy !== -1) {
                if (node.yon === 1) {
                    ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 3; ctx.setLineDash([4, 4]);
                } else if (node.yon === -1) {
                    ctx.strokeStyle = '#ff9100'; ctx.lineWidth = 3; ctx.setLineDash([4, 4]);
                }
            }
            ctx.stroke();

            // 3. YAZI ÇİZİMİ
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (node.energy === -1) {
                ctx.fillStyle = textColors["-1"];
                ctx.fillText("B", x, y);
            } else if (node.energy !== null) {
                ctx.fillStyle = textColors[String(node.energy)] || '#fff';
                ctx.fillText(node.energy, x, y);
            }
        }

        function renderMap() {
            // Ekran temizleme
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Sırayla haritayı baştan ayağa zorla çizdiriyoruz
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    const idx = row * 6 + col;
                    if (nodes[idx]) {
                        const coords = getCenter(col, row);
                        drawHexAndBorder(coords.x, coords.y, nodes[idx]);
                    }
                }
            }
            const turnValEl = document.getElementById('turn_val');
            if (turnValEl) turnValEl.innerText = turn;
        }

        function advanceTurn(steppedNodeIndex) {
            turn++;
            for (let i = 0; i < nodes.length; i++) {
                let node = nodes[i];
                if (node.energy === null || node.energy === -1) continue;
                
                if (i === steppedNodeIndex) continue; // Tıklanan oyuncu hücresi korunur

                node.energy += node.yon;
                if (node.energy >= 3) { node.energy = 3; node.yon = -1; }
                else if (node.energy <= 0) { node.energy = 0; node.yon = 1; }
            }
            renderMap();
        }

        function resetSimulation() {
            turn = 1;
            isSimulationPhase = false;
            activeLiveTool = "none";
            initEmptyMap();
            updateUI();
            renderMap();
        }

        // Tıklama Yakalayıcı
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mY = (e.clientY - rect.top) * (canvas.height / rect.height);

            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    const coords = getCenter(col, row);
                    if (Math.hypot(mX - coords.x, mY - coords.y) < globalRadius * 0.85) {
                        const idx = row * 6 + col;
                        if (!nodes[idx]) return;

                        // Canlı Goril/İdol Aracı aktifse
                        if (activeLiveTool === "plus" && nodes[idx].energy !== null && nodes[idx].energy !== -1) {
                            nodes[idx].energy = Math.min(3, nodes[idx].energy + 1);
                            if (nodes[idx].energy === 3) nodes[idx].yon = -1;
                            renderMap();
                            return;
                        } else if (activeLiveTool === "minus" && nodes[idx].energy !== null && nodes[idx].energy !== -1) {
                            nodes[idx].energy = Math.max(0, nodes[idx].energy - 1);
                            if (nodes[idx].energy === 0) nodes[idx].yon = 1;
                            renderMap();
                            return;
                        }

                        // SİMÜLASYON FAZI TIKLAMASI
                        if (isSimulationPhase && activeLiveTool === "none") {
                            if (nodes[idx].energy !== null && nodes[idx].energy !== -1) {
                                advanceTurn(idx); 
                            }
                            return;
                        }

                        // KURULUM FAZI TIKLAMASI (Eski klasik döngün)
                        if (!isSimulationPhase && activeLiveTool === "none") {
                            if (nodes[idx].energy === null) { nodes[idx].energy = 0; nodes[idx].yon = 1; }
                            else if (nodes[idx].energy === 0) { nodes[idx].energy = 1; nodes[idx].yon = -1; }
                            else if (nodes[idx].energy === 1) { nodes[idx].energy = 2; nodes[idx].yon = -1; }
                            else if (nodes[idx].energy === 2) { nodes[idx].energy = 3; nodes[idx].yon = -1; }
                            else if (nodes[idx].energy === 3) { nodes[idx].energy = -1; nodes[idx].yon = 0; }
                            else if (nodes[idx].energy === -1) { nodes[idx].energy = null; nodes[idx].yon = 0; }
                            renderMap();
                        }
                        return;
                    }
                }
            }
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        document.getElementById('phase_toggle_btn').addEventListener('click', () => {
            isSimulationPhase = !isSimulationPhase;
            updateUI();
            renderMap();
        });

        document.getElementById('live_plus_btn').addEventListener('click', () => {
            activeLiveTool = (activeLiveTool === "plus") ? "none" : "plus";
            updateUI();
        });

        document.getElementById('live_minus_btn').addEventListener('click', () => {
            activeLiveTool = (activeLiveTool === "minus") ? "none" : "minus";
            updateUI();
        });

        document.getElementById('reset_btn').addEventListener('click', resetSimulation);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyR' || e.keyCode === 82) {
                e.preventDefault();
                resetSimulation();
            }
        });

        // Tetikleme
        resetSimulation();
    </script>
</body>
</html>
