<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tide Hexagon Simulator v27.0 (3-Phase Editor)</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .info-panel { font-size: 18px; margin-bottom: 15px; color: #aaa; display: flex; justify-content: center; align-items: center; gap: 12px; flex-wrap: wrap; }
        
        .btn {
            color: white; border: none; padding: 10px 18px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s;
        }
        .phase-1-btn { background: #2980b9; box-shadow: 0 0 10px rgba(41, 128, 185, 0.4); }
        .phase-2-btn { background: #27ae60; box-shadow: 0 0 10px rgba(39, 174, 96, 0.4); }
        .phase-3-btn { background: #d35400; box-shadow: 0 0 10px rgba(211, 84, 0, 0.4); }
        
        .active-phase-btn { outline: 3px solid #fff; transform: scale(1.05); }
        .reset-btn { background: #c0392b; }

        #mainCanvas { 
            background: #1a1a1a; 
            border: 2px solid #333; 
            border-radius: 12px; 
            margin-top: 10px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: inline-block;
        }
        .legend-area { display: flex; justify-content: center; gap: 15px; margin-top: 20px; font-size: 14px; }
        .leg-item { display: flex; align-items: center; gap: 5px; }
        .leg-box { width: 15px; height: 15px; border-radius: 3px; }
        .status-txt { font-weight: bold; }
    </style>
</head>
<body>

    <div class="info-panel">
        <div>Turn: <span id="turn_val" style="color:white; font-weight:bold;">1</span></div>
        <div>Active Phase: <span id="status_val" class="status-txt"></span></div>
        
        <button id="btn_p1" class="btn phase-1-btn">1. Set Capacities</button>
        <button id="btn_p2" class="btn phase-2-btn">2. Set Init Energy</button>
        <button id="btn_p3" class="btn phase-3-btn">3. Run Simulation</button>
        
        <button id="reset_btn" class="reset-btn btn">🔄 Wipe All</button>
    </div>
    
    <h2>Tide Simulator v27.0 (The 3-Phase Workflow)</h2>
    
    <canvas id="mainCanvas" width="600" height="320"></canvas>
    
    <p style="color:#eee; background: #222; padding: 10px; display: inline-block; border-radius: 6px;" id="helper_txt"></p>

    <div class="legend-area">
        <div class="leg-item"><div class="leg-box" style="background:#1e1e1e; border:1px solid #333;"></div> Empty Space</div>
        <div class="leg-item"><div class="leg-box" style="background:#2ecc71"></div> Safe</div>
        <div class="leg-item"><div class="leg-box" style="background:#f1c40f"></div> Stable</div>
        <div class="leg-item"><div class="leg-box" style="background:#e74c3c"></div> Critical</div>
        <div class="leg-item"><div class="leg-box" style="background:#34495e"></div> Collapsed</div>
        <div class="leg-item"><div class="leg-box" style="background:#0a0a0a; border:1px dashed #555;"></div> [B] Block / Obstacle</div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        let currentPhase = 1; // 1: Capacity, 2: Init Energy, 3: Simulation
        let turn = 1;
        const globalRadius = 42; 

        const colors = { 
            "null": '#1e1e1e', "-1": '#0a0a0a',
            "3": '#2ecc71', "2": '#f1c40f', "1": '#e74c3c', "0": '#34495e' 
        };
        const textColors = { "3": '#000', "2": '#000', "1": '#fff', "0": '#fff', "-1": '#888' };
        
        let nodes = [];
        let savedSnapshot = []; // Phase 2'nin son halini korur

        function initEmptyMap() {
            nodes = [];
            for (let i = 0; i < 18; i++) {
                nodes.push({ energy: null, yon: 1, maxEnergy: 3, isBlock: false }); 
            }
            savedSnapshot = [];
        }

        function updateUI() {
            // Butonların aktiflik durum çizgileri
            document.getElementById('btn_p1').className = "btn phase-1-btn" + (currentPhase === 1 ? " active-phase-btn" : "");
            document.getElementById('btn_p2').className = "btn phase-2-btn" + (currentPhase === 2 ? " active-phase-btn" : "");
            document.getElementById('btn_p3').className = "btn phase-3-btn" + (currentPhase === 3 ? " active-phase-btn" : "");

            const statusEl = document.getElementById('status_val');
            const helperEl = document.getElementById('helper_txt');

            if (currentPhase === 1) {
                statusEl.innerText = "1. NODE CAPACITY SETTING"; statusEl.style.color = "#3498db";
                helperEl.innerHTML = "🛠️ <b>Phase 1:</b> Click cells to define Max Capacities (1 → 2 → 3) or set a Block (B).";
            } else if (currentPhase === 2) {
                statusEl.innerText = "2. ENERGY INITIALIZATION"; statusEl.style.color = "#2ecc71";
                helperEl.innerHTML = "⚡ <b>Phase 2:</b> Click cells to inject initial energy. Sapped to cell's individual maximum capacity limit!";
            } else if (currentPhase === 3) {
                statusEl.innerText = "3. ACTIVE SIMULATION"; statusEl.style.color = "#e67e22";
                helperEl.innerHTML = "🏃‍♂️ <b>Phase 3:</b> Click nodes to step the puzzle. Returning to Phase 2 will rewind to original energy counts.";
            }
        }

        function getCenter(col, row) {
            const w = globalRadius * Math.sqrt(3);
            const h = globalRadius * 2;
            let x = 90 + col * w;
            if (row % 2 === 1) x += w / 2;
            const y = 70 + row * (h * 3/4);
            return { x, y };
        }

        function drawHexAndBorder(x, y, node) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i + (Math.PI / 6);
                const hX = x + globalRadius * Math.cos(angle);
                const hY = y + globalRadius * Math.sin(angle);
                if (i === 0) ctx.moveTo(hX, hY);
                else ctx.lineTo(hX, hY);
            }
            ctx.closePath();

            let fillKey = "null";
            if (node.isBlock) fillKey = "-1";
            else if (node.energy !== null) fillKey = String(node.energy);

            ctx.fillStyle = colors[fillKey] || colors["null"];
            ctx.fill();

            // Border kalınlığı Max Kapasiteyi gösterir
            ctx.strokeStyle = '#333';
            if (!node.isBlock) {
                ctx.lineWidth = node.maxEnergy === 3 ? 4 : (node.maxEnergy === 2 ? 2 : 0.8);
            } else {
                ctx.lineWidth = 2;
            }
            ctx.setLineDash([]);
            
            // Simülasyon yön çizgileri
            if (currentPhase === 3 && node.energy !== null && !node.isBlock) {
                if (node.yon === 1) { ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 3; ctx.setLineDash([4, 4]); }
                else if (node.yon === -1) { ctx.strokeStyle = '#ff9100'; ctx.lineWidth = 3; ctx.setLineDash([4, 4]); }
            }
            ctx.stroke();

            // Küçük Kılavuz Bilgisi
            if (!node.isBlock && currentPhase !== 3) {
                ctx.font = '9px sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.fillText(`cap:${node.maxEnergy}`, x, y + 15);
            }

            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (node.isBlock) {
                ctx.fillStyle = textColors["-1"];
                ctx.fillText("B", x, y);
            } else if (node.energy !== null) {
                ctx.fillStyle = textColors[String(node.energy)] || '#fff';
                ctx.fillText(node.energy, x, y - 2);
            }
        }

        function renderMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    const idx = row * 6 + col;
                    if (nodes[idx]) {
                        const coords = getCenter(col, row);
                        drawHexAndBorder(coords.x, coords.y, nodes[idx]);
                    }
                }
            }
            document.getElementById('turn_val').innerText = turn;
        }

        function advanceTurn(steppedNodeIndex) {
            turn++;
            for (let i = 0; i < nodes.length; i++) {
                let node = nodes[i];
                if (node.energy === null || node.isBlock) continue;
                if (i === steppedNodeIndex) continue; 

                node.energy += node.yon;
                if (node.energy >= node.maxEnergy) { node.energy = node.maxEnergy; node.yon = -1; }
                else if (node.energy <= 0) { node.energy = 0; node.yon = 1; }
            }
            renderMap();
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mY = (e.clientY - rect.top) * (canvas.height / rect.height);

            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    const coords = getCenter(col, row);
                    if (Math.hypot(mX - coords.x, mY - coords.y) < globalRadius * 0.85) {
                        const idx = row * 6 + col;
                        if (!nodes[idx]) return;
                        let n = nodes[idx];

                        // FAZ 1: Sadece Kapasite ve Engel Belirleme
                        if (currentPhase === 1) {
                            if (!n.isBlock && n.maxEnergy === 3) { n.maxEnergy = 2; }
                            else if (!n.isBlock && n.maxEnergy === 2) { n.maxEnergy = 1; }
                            else if (!n.isBlock && n.maxEnergy === 1) { n.isBlock = true; n.energy = null; }
                            else if (n.isBlock) { n.isBlock = false; n.maxEnergy = 3; }
                            renderMap();
                        }
                        
                        // FAZ 2: Sadece Enerji Yerleştirme (Kapasite Sınırına Sadık Kalır)
                        else if (currentPhase === 2) {
                            if (n.isBlock) return; // Engele enerji verilemez
                            if (n.energy === null) { n.energy = 0; n.yon = 1; }
                            else if (n.energy < n.maxEnergy) { n.energy++; n.yon = (n.energy === n.maxEnergy) ? -1 : 1; }
                            else { n.energy = null; }
                            renderMap();
                        }
                        
                        // FAZ 3: Canlı Oynanış Simülasyonu
                        else if (currentPhase === 3) {
                            if (!n.isBlock && n.energy !== null) {
                                advanceTurn(idx);
                            }
                        }
                        return;
                    }
                }
            }
        });

        // ÜST FAZ BUTONLARININ TETİKLEYİCİLERİ
        document.getElementById('btn_p1').addEventListener('click', () => {
            currentPhase = 1; turn = 1; updateUI(); renderMap();
        });

        document.getElementById('btn_p2').addEventListener('click', () => {
            // Eğer simülasyondan geri çıkılıyorsa snapshot'ı geri yükle
            if (currentPhase === 3 && savedSnapshot.length > 0) {
                nodes = savedSnapshot.map(n => ({ energy: n.energy, yon: n.yon, maxEnergy: n.maxEnergy, isBlock: n.isBlock }));
            }
            currentPhase = 2; turn = 1; updateUI(); renderMap();
        });

        document.getElementById('btn_p3').addEventListener('click', () => {
            if (currentPhase !== 3) {
                // Faz 2'nin son durumunu tam oynamaya başlarken hafızaya alıyoruz (Yedek)
                savedSnapshot = nodes.map(n => ({ energy: n.energy, yon: n.yon, maxEnergy: n.maxEnergy, isBlock: n.isBlock }));
            }
            currentPhase = 3; updateUI(); renderMap();
        });

        document.getElementById('reset_btn').addEventListener('click', () => {
            turn = 1; currentPhase = 1; initEmptyMap(); updateUI(); renderMap();
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());
        initEmptyMap(); updateUI(); renderMap();
    </script>
</body>
</html>
