<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gel-Git Hexagon Simulator v10.0 (Block Nodes)</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .info-panel { font-size: 20px; margin-bottom: 10px; color: #aaa; }
        canvas { background: #1a1a1a; border: 2px solid #333; border-radius: 12px; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .legend-area { display: flex; justify-content: center; gap: 15px; margin-top: 20px; font-size: 14px; }
        .leg-item { display: flex; align-items: center; gap: 5px; }
        .leg-box { width: 15px; height: 15px; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="info-panel">
        Turn: <span id="turn_val" style="color:white; font-weight:bold;">1</span>
    </div>
    
    <h2>Gel-Git Simulator (Block Özellikli Evrensel Matris)</h2>
    
    <canvas id="mainCanvas" width="600" height="320"></canvas>
    
    <p style="color:#888;">💡 Sol Tik: Enerjiyi Değiştir (0 -> 1 -> 2 -> 3 -> -1 Block) | SPACE: Turn Atla</p>

    <div class="legend-area">
        <div class="leg-item"><div class="leg-box" style="background:#2ecc71"></div> [3] Guvenli</div>
        <div class="leg-item"><div class="leg-box" style="background:#f1c40f"></div> [2] Stabil</div>
        <div class="leg-item"><div class="leg-box" style="background:#e74c3c"></div> [1] Kritik</div>
        <div class="leg-item"><div class="leg-box" style="background:#34495e"></div> [0] Cokmus</div>
        <div class="leg-item"><div class="leg-box" style="background:#121212; border: 1px dashed #555;"></div> [-1] Block / Duvar (Sabit)</div>
        <div class="leg-item"><div class="leg-box" style="background:transparent; border: 2px dashed #00e5ff;"></div> ⬆️ Yükselen Mod Halkanız</div>
        <div class="leg-item"><div class="leg-box" style="background:transparent; border: 2px dashed #ff9100;"></div> ⬇️ Eriyen Mod Halkanız</div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        let turn = 1;
        const r = 42; 
        
        // Renk paletine -1 (Block) durumunu ekledik
        const colors = { 3: '#2ecc71', 2: '#f1c40f', 1: '#e74c3c', 0: '#34495e', "-1": '#121212' };
        const textColors = { 3: '#000', 2: '#000', 1: '#fff', 0: '#fff', "-1": '#fff' };

        // --- EVRENSEL HEXAGON SINIFI ---
        class HexNode {
            constructor(energy, startState = 'none') {
                this.energy = energy; // 0, 1, 2, 3 veya -1 (Block)
                this.reachedZero = (startState === 'rising' || energy === 0);   
                this.reachedThree = (startState === 'sinking' || energy === 3);  
                this.nextDirection = 0;     
            }

            // TUR BAŞINDA KARAR ALMA
            calculateNextMove() {
                // EĞER BLOCK İSE: Turnlerde hiç seviye atlamaz, sabit kalır!
                if (this.energy === -1) {
                    this.nextDirection = 0;
                    this.reachedZero = false;
                    this.reachedThree = false;
                    return;
                }

                // 1. Sıfıra vuran taş 3 olana kadar zorla yükselir
                if (this.reachedZero) {
                    this.nextDirection = 1;
                    return;
                }

                // 2. Üçe vuran taş 0 olana kadar zorla erir
                if (this.reachedThree) {
                    this.nextDirection = -1;
                    return;
                }

                // 3. Varsayılan akış
                this.nextDirection = -1;
            }

            // HAREKETİ UYGULAMA VE SAKLAMA
            applyMove() {
                // Eğer Block ise burayı da doğrudan atlar, asla değişmez
                if (this.energy === -1) return;

                this.energy = Math.max(0, Math.min(3, this.energy + this.nextDirection));

                // Sınır hafıza yönetimi
                if (this.energy === 0) {
                    this.reachedZero = true;
                    this.reachedThree = false;
                } else if (this.energy === 3) {
                    this.reachedThree = true;
                    this.reachedZero = false;
                }
            }
        }

        // Test için haritaya bir adet baştan -1 (Block) yerleştirdim
        let nodes = [
            new HexNode(3),  new HexNode(2),  new HexNode(1, 'rising'), new HexNode(0),  new HexNode(-1), new HexNode(2),
            new HexNode(2),  new HexNode(-1), new HexNode(0),           new HexNode(3),  new HexNode(2),  new HexNode(1),
            new HexNode(1),  new HexNode(0),  new HexNode(3),           new HexNode(-1), new HexNode(1),  new HexNode(0)
        ];

        function getCenter(col, row) {
            const w = r * Math.sqrt(3);
            const h = r * 2;
            let x = 90 + col * w;
            if (row % 2 === 1) x += w / 2;
            const y = 70 + row * (h * 3/4);
            return { x, y };
        }

        function drawHex(x, y, node) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i + (Math.PI / 6);
                const hX = x + r * Math.cos(angle);
                const hY = y + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(hX, hY);
                else ctx.lineTo(hX, hY);
            }
            ctx.closePath();

            ctx.fillStyle = colors[node.energy];
            ctx.fill();

            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 2;
            ctx.setLineDash([]);
            
            // Eğer taş Block (-1) değilse yön halkalarını çiz
            if (node.energy !== -1) {
                if (node.reachedZero) {
                    ctx.strokeStyle = '#00e5ff'; // Yükselenler Cyan halka
                    ctx.lineWidth = 3;
                    ctx.setLineDash([4, 4]);
                } else if (node.reachedThree) {
                    ctx.strokeStyle = '#ff9100'; // Eriyenler Turuncu halka
                    ctx.lineWidth = 3;
                    ctx.setLineDash([4, 4]);
                }
            } else {
                // Block taşların kenarlığı belli olsun diye ince gri yapalım
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
            }
            ctx.stroke();

            // Sadece Block olmayan taşların içine rakam yazdır
            if (node.energy !== -1) {
                ctx.fillStyle = textColors[node.energy];
                ctx.font = 'bold 18px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(node.energy, x, y);
            }
        }

        function renderMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    const idx = row * 6 + col;
                    const { x, y } = getCenter(col, row);
                    drawHex(x, y, nodes[idx]);
                }
            }
            document.getElementById('turn_val').innerText = turn;
        }

        function clickCheck(e) {
            const rect = canvas.getBoundingClientRect();
            const mX = e.clientX - rect.left;
            const mY = e.clientY - rect.top;

            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    const { x, y } = getCenter(col, row);
                    if (Math.hypot(mX - x, mY - y) < r * 0.85) {
                        const idx = row * 6 + col;
                        
                        // Döngü: 0 -> 1 -> 2 -> 3 -> -1 -> 0
                        if (nodes[idx].energy === 3) {
                            nodes[idx].energy = -1; // Block moduna geçiş
                        } else if (nodes[idx].energy === -1) {
                            nodes[idx].energy = 0;
                        } else {
                            nodes[idx].energy++;
                        }
                        
                        // Hafızaları temizle/ayarla
                        nodes[idx].reachedZero = (nodes[idx].energy === 0);
                        nodes[idx].reachedThree = (nodes[idx].energy === 3);
                        
                        renderMap();
                        return;
                    }
                }
            }
        }

        canvas.addEventListener('click', clickCheck);
        canvas.addEventListener('contextmenu', (e) => e.preventDefault()); 

        // --- GEL-GİT OYUN DÖNGÜSÜ (SPACE) ---
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.keyCode === 32) {
                e.preventDefault(); 
                turn++;

                // AŞAMA 1: Her taş bağımsız karar alır (Block olanlar 0 yönü seçer)
                nodes.forEach(node => node.calculateNextMove());

                // AŞAMA 2: Kararlar uygulanır
                nodes.forEach(node => node.applyMove());

                renderMap();
            }
        });

        window.onload = function() { renderMap(); };
        renderMap();
    </script>
</body>
</html>
