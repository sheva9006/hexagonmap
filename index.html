<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gel-Git Hexagon Simulator v11.0 (Pure Matrix)</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .info-panel { font-size: 20px; margin-bottom: 10px; color: #aaa; }
        canvas { background: #1a1a1a; border: 2px solid #333; border-radius: 12px; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .legend-area { display: flex; justify-content: center; gap: 15px; margin-top: 20px; font-size: 14px; }
        .leg-item { display: flex; align-items: center; gap: 5px; }
        .leg-box { width: 15px; height: 15px; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="info-panel">
        Turn: <span id="turn_val" style="color:white; font-weight:bold;">1</span>
    </div>
    
    <h2>Gel-Git Simulator (Saf & Hırçın 6x3 Matris)</h2>
    
    <canvas id="mainCanvas" width="600" height="320"></canvas>
    
    <p style="color:#888;">💡 Tıkla: Değeri Değiştir (0, 1, 2, 3, -1 Block) | SPACE (Boşluk): Turn Atla</p>

    <div class="legend-area">
        <div class="leg-item"><div class="leg-box" style="background:#2ecc71"></div> [3] Guvenli</div>
        <div class="leg-item"><div class="leg-box" style="background:#f1c40f"></div> [2] Stabil</div>
        <div class="leg-item"><div class="leg-box" style="background:#e74c3c"></div> [1] Kritik</div>
        <div class="leg-item"><div class="leg-box" style="background:#34495e"></div> [0] Cokmus</div>
        <div class="leg-item"><div class="leg-box" style="background:#121212; border: 1px dashed #555;"></div> [-1] Block / Duvar (Asla Seviye Atlamaz)</div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        let turn = 1;
        const r = 42; 
        
        const colors = { 3: '#2ecc71', 2: '#f1c40f', 1: '#e74c3c', 0: '#34495e', "-1": '#121212' };
        const textColors = { 3: '#000', 2: '#000', 1: '#fff', 0: '#fff', "-1": '#fff' };

        // 6x3 Matris - Dümdüz, hilesiz hurdasız JavaScript Nesneleri
        // energy: seviye, yon: o anki hareket yönü (1 = artış, -1 = azalış, 0 = sabit)
        let nodes = [
            { energy: 3, yon: -1 }, { energy: 2, yon: -1 }, { energy: 1, yon: 1 },  { energy: 0, yon: 1 },  { energy: -1, yon: 0 }, { energy: 2, yon: -1 },
            { energy: 2, yon: -1 }, { energy: -1, yon: 0 }, { energy: 0, yon: 1 },  { energy: 3, yon: -1 }, { energy: 2, yon: -1 }, { energy: 1, yon: -1 },
            { energy: 1, yon: -1 }, { energy: 0, yon: 1 },  { energy: 3, yon: -1 }, { energy: -1, yon: 0 }, { energy: 1, yon: 1 },  { energy: 0, yon: 1 }
        ];

        function getCenter(col, row) {
            const w = r * Math.sqrt(3);
            const h = r * 2;
            let x = 90 + col * w;
            if (row % 2 === 1) x += w / 2;
            const y = 70 + row * (h * 3/4);
            return { x, y };
        }

        function drawHex(x, y, node) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i + (Math.PI / 6);
                const hX = x + r * Math.cos(angle);
                const hY = y + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(hX, hY);
                else ctx.lineTo(hX, hY);
            }
            ctx.closePath();

            // Renk doldurma
            ctx.fillStyle = colors[node.energy] || '#34495e';
            ctx.fill();

            // Kenarlık çizgisi
            ctx.strokeStyle = node.energy === -1 ? '#444' : '#1a1a1a';
            ctx.lineWidth = node.energy === -1 ? 1 : 2;
            ctx.setLineDash([]);
            
            // Yön çizgileri (Block değilse ve yönü varsa)
            if (node.energy !== -1) {
                if (node.yon === 1) {
                    ctx.strokeStyle = '#00e5ff'; // Yükselenlere Cyan çerçeve
                    ctx.lineWidth = 3;
                    ctx.setLineDash([4, 4]);
                } else if (node.yon === -1) {
                    ctx.strokeStyle = '#ff9100'; // Eriyenlere Turuncu çerçeve
                    ctx.lineWidth = 3;
                    ctx.setLineDash([4, 4]);
                }
            }
            ctx.stroke();

            // Sayı yazdırma (Block olanlara yazma)
            if (node.energy !== -1) {
                ctx.fillStyle = textColors[node.energy];
                ctx.font = 'bold 18px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(node.energy, x, y);
            }
        }

        function renderMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    const idx = row * 6 + col;
                    const { x, y } = getCenter(col, row);
                    drawHex(x, y, nodes[idx]);
                }
            }
            document.getElementById('turn_val').innerText = turn;
        }

        // Tıklayınca değer değiştirme döngüsü
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mX = e.clientX - rect.left;
            const mY = e.clientY - rect.top;

            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    const { x, y } = getCenter(col, row);
                    if (Math.hypot(mX - x, mY - y) < r * 0.85) {
                        const idx = row * 6 + col;
                        
                        // Sıra: 0 -> 1 -> 2 -> 3 -> -1 -> 0
                        if (nodes[idx].energy === 3) {
                            nodes[idx].energy = -1;
                            nodes[idx].yon = 0; // Block oldu, yön bitti
                        } else if (nodes[idx].energy === -1) {
                            nodes[idx].energy = 0;
                            nodes[idx].yon = 1; // Sıfır olunca yükselme emri
                        } else {
                            nodes[idx].energy++;
                            nodes[idx].yon = nodes[idx].energy === 3 ? -1 : -1; // Ara geçişlerde erime eğilimi
                        }
                        
                        renderMap();
                        return;
                    }
                }
            }
        });

        // Sağ tık menüsünü engelle
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // --- TURN MOTORU (SPACE) ---
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.keyCode === 32) {
                e.preventDefault(); 
                turn++;

                // Her turn atlandığında doğrudan matris üzerinde işlem yapıyoruz
                for (let i = 0; i < nodes.length; i++) {
                    let node = nodes[i];

                    // EĞER BLOCK (-1) İSE ASLA SEVİYE ATLAMAZ! Direkt geç.
                    if (node.energy === -1) {
                        node.yon = 0;
                        continue;
                    }

                    // Enerjiyi o anki yöne göre değiştir
                    node.energy +=
