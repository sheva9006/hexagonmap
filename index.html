<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gel-Git Hexagon Simulator v5.0 (reachedZero Memory)</title>
    <style>
        body { 
            background: #121212; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        .info-panel { 
            font-size: 20px; 
            margin-bottom: 10px; 
            color: #aaa; 
        }
        canvas { 
            background: #1a1a1a; 
            border: 2px solid #333; 
            border-radius: 12px; 
            margin-top: 20px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .legend-area { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 20px; 
            font-size: 14px; 
        }
        .leg-item { 
            display: flex; 
            align-items: center; 
            gap: 5px; 
        }
        .leg-box { 
            width: 15px; 
            height: 15px; 
            border-radius: 3px; 
        }
    </style>
</head>
<body>

    <div class="info-panel">
        Turn: <span id="turn_val" style="color:white; font-weight:bold;">1</span> | 
        Genel Dalga: <span id="dir_val" style="color:#2ecc71; font-weight:bold;">Yukselis (+1)</span>
    </div>
    
    <h2>Gel-Git Simulator (6x3 Hafızalı Matris)</h2>
    
    <canvas id="mainCanvas" width="600" height="320"></canvas>
    
    <p style="color:#888;">💡 Sol Tik: Enerji Artir | Sag Tik: Tipi Degistir (Normal / Ters) | SPACE: Turn Atla</p>

    <div class="legend-area">
        <div class="leg-item"><div class="leg-box" style="background:#2ecc71"></div> [3] Guvenli</div>
        <div class="leg-item"><div class="leg-box" style="background:#f1c40f"></div> [2] Stabil</div>
        <div class="leg-item"><div class="leg-box" style="background:#e74c3c"></div> [1] Kritik</div>
        <div class="leg-item"><div class="leg-box" style="background:#34495e"></div> [0] Cokmus</div>
        <div class="leg-item"><div class="leg-box" style="background:transparent; border: 2px dashed #00e5ff;"></div> [*] Kurtarma Modundaki Hex (reachedZero)</div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        let turn = 1;
        let globalDirection = 1; // 1: Yukselis, -1: Erime

        const r = 42; 
        const colors = { 3: '#2ecc71', 2: '#f1c40f', 1: '#e74c3c', 0: '#34495e', "wall": '#121212' };
        const textColors = { 3: '#000', 2: '#000', 1: '#fff', 0: '#fff', "wall": '#fff' };

        // --- NODES/HEXAGON SINIFI ---
        class HexNode {
            constructor(energy, type = 'normal') {
                this.energy = energy;         // 0, 1, 2, 3
                this.type = type;             // 'normal' veya 'invert'
                this.isWall = false;          // Engel/Duvar durumu
                this.reachedZero = false;     // SIFIRA ULAŞTI MI HAFIZASI
            }

            // Her turn tetiklenen enerji degisim mekanigi
            updateEnergy(waveDir) {
                if (this.isWall) return;

                // EGER SIFIRA VURDUYSA: Hafıza devreye girer, dalgadan bagimsiz ZORLA yukselir
                if (this.reachedZero) {
                    this.energy++;
                    // Maksimuma ulasinca hafiza sifirlanir, normal ritme doner
                    if (this.energy >= 3) {
                        this.energy = 3;
                        this.reachedZero = false;
                    }
                    return; // Alttaki normal hesaplamayi atla
                }

                // NORMAL AKIŞ HESAPLAMASI
                let localDir = this.type === 'invert' ? -waveDir : waveDir;
                this.energy = Math.max(0, Math.min(3, this.energy + localDir));

                // KONTROL: Bu adimda sıfıra düştü mü? Düştüyse hafızayı aç
                if (this.energy === 0) {
                    this.reachedZero = true;
                }
            }
        }

        // 6x3 Matrisi Sınıf Örnekleriyle Başlat
        let nodes = [
            new HexNode(3, 'normal'), new HexNode(2, 'normal'), new HexNode(1, 'invert'), new HexNode(0, 'normal'), new HexNode(3, 'normal'), new HexNode(2, 'invert'),
            new HexNode(2, 'normal'), new HexNode(1, 'invert'), new HexNode(0, 'normal'), new HexNode(3, 'invert'), new HexNode(2, 'normal'), new HexNode(1, 'normal'),
            new HexNode(1, 'invert'), new HexNode(0, 'normal'), new HexNode(3, 'normal'), new HexNode(2, 'normal'), new HexNode(1, 'invert'), new HexNode(0, 'normal')
        ];

        // Haritada baslangicta 0 olanlari reachedZero olarak isaretleyelim ki ilk elden yukselmeye baslasinlar
        nodes.forEach(n => { if(n.energy === 0) n.reachedZero = true; });

        function getCenter(col, row) {
            const w = r * Math.sqrt(3);
            const h = r * 2;
            let x = 90 + col * w;
            if (row % 2 === 1) x += w / 2;
            const y = 70 + row * (h * 3/4);
            return { x, y };
        }

        function drawHex(x, y, node) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i + (Math.PI / 6);
                const hX = x + r * Math.cos(angle);
                const hY = y + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(hX, hY);
                else ctx.lineTo(hX, hY);
            }
            ctx.closePath();

            ctx.fillStyle = node.isWall ? colors['wall'] : colors[node.energy];
            ctx.fill();

            // Kontur Çizgileri
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 2;
            ctx.setLineDash([]);
            
            // reachedZero=true olan taslari fark etmek icin parlak cyan rengi kesikli cizgi yapalim
            if (node.reachedZero && !node.isWall) {
                ctx.strokeStyle = '#00e5ff'; 
                ctx.lineWidth = 3;
                ctx.setLineDash([4, 4]);
            } else if (node.type === 'invert' && !node.isWall) {
                ctx.strokeStyle = '#ffffff'; 
                ctx.lineWidth = 2;
                ctx.setLineDash([8, 4]);
            }
            ctx.stroke();

            // Yazı yazdırma
            if (!node.isWall) {
                ctx.fillStyle = textColors[node.energy];
                ctx.font = 'bold 18px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let prefix = node.type === 'invert' ? 'T' : '';
                // Eger reachedZero aktifse yanina bir yıldız koyalim anlasilsin
                let suffix = node.reachedZero ? '*' : '';
                ctx.fillText(prefix + node.energy + suffix, x, y);
            }
        }

        function renderMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    const idx = row * 6 + col;
                    const { x, y } = getCenter(col, row);
                    drawHex(x, y, nodes[idx]);
                }
            }
            document.getElementById('turn_val').innerText = turn;
            const dSpan = document.getElementById('dir_val');
            if (globalDirection > 0) {
                dSpan.innerText = "Yukselis (+1)";
                dSpan.style.color = "#2ecc71";
            } else {
                dSpan.innerText = "Erime (-1)";
                dSpan.style.color = "#e74c3c";
            }
        }

        function clickCheck(e, isRight) {
            const rect = canvas.getBoundingClientRect();
            const mX = e.clientX - rect.left;
            const mY = e.clientY - rect.top;

            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    const { x, y } = getCenter(col, row);
                    if (Math.hypot(mX - x, mY - y) < r * 0.85) {
                        const idx = row * 6 + col;
                        
                        if (isRight) {
                            nodes[idx].type = nodes[idx].type === 'normal' ? 'invert' : 'normal';
                        } else {
                            nodes[idx].energy = (nodes[idx].energy + 1) % 4;
                            // Manuel 0 yapildiysa hafizayi tetikle, degilse kapat
                            nodes[idx].reachedZero = (nodes[idx].energy === 0);
                        }
                        renderMap();
                        return;
                    }
                }
            }
        }

        canvas.addEventListener('click', (e) => clickCheck(e, false));
        canvas.addEventListener('contextmenu', (e) => { e.preventDefault(); clickCheck(e, true); });

        // SPACE BAR: Gel-Git Tur Atlama Motoru
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.keyCode === 32) {
                e.preventDefault(); 
                turn++;

                // Sınıf metodu yardımıyla her node'u güncelle
                nodes.forEach(node => node.updateEnergy(globalDirection));

                // Global dalga yönünü belirleme kuralları
                let activeNodes = nodes.filter(n => !n.isWall);
                if (activeNodes.length > 0) {
                    let maxEnergy = Math.max(...activeNodes.map(n => n.energy));
                    let minEnergy = Math.min(...activeNodes.map(n => n.energy));

                    if (maxEnergy === 0) globalDirection = 1;
                    else if (minEnergy === 3) globalDirection = -1;
                }

                renderMap();
            }
        });

        window.onload = function() { renderMap(); };
        renderMap();
    </script>
</body>
</html>
