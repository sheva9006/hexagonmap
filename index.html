<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gel-Git Hexagon Simulator v13.0 (Map Editor Mode)</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .info-panel { font-size: 20px; margin-bottom: 15px; color: #aaa; display: flex; justify-content: center; align-items: center; gap: 20px; }
        
        .reset-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .reset-btn:hover { background: #c0392b; }

        canvas { background: #1a1a1a; border: 2px solid #333; border-radius: 12px; margin-top: 10px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .legend-area { display: flex; justify-content: center; gap: 15px; margin-top: 20px; font-size: 14px; }
        .leg-item { display: flex; align-items: center; gap: 5px; }
        .leg-box { width: 15px; height: 15px; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="info-panel">
        <div>Turn: <span id="turn_val" style="color:white; font-weight:bold;">1</span></div>
        <button class="reset-btn" onclick="resetSimulation()">🔄 Haritayı Temizle (R)</button>
    </div>
    
    <h2>Gel-Git Simulator (Önce Yolu Çiz, Sonra Başlat)</h2>
    
    <canvas id="mainCanvas" width="600" height="320"></canvas>
    
    <p style="color:#888;">💡 <b>Önce Tasarla:</b> Hücrelere tıklayarak P0-P3 arası oyuncu veya B (Block) yerleştir. | <b>SPACE:</b> Simülasyonu Başlat/Turn Atlat</p>

    <div class="legend-area">
        <div class="leg-item"><div class="leg-box" style="background:#1a1a1a; border:1px solid #333;"></div> Boş / İnaktif Hücre</div>
        <div class="leg-item"><div class="leg-box" style="background:#2ecc71"></div> [P3] Max Güç</div>
        <div class="leg-item"><div class="leg-box" style="background:#f1c40f"></div> [P2] Stabil</div>
        <div class="leg-item"><div class="leg-box" style="background:#e74c3c"></div> [P1] Kritik</div>
        <div class="leg-item"><div class="leg-box" style="background:#34495e"></div> [P0] Çökmüş</div>
        <div class="leg-item"><div class="leg-box" style="background:#0a0a0a; border: 1px dashed #777;"></div> [B] Block / Engel (Sabit)</div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        let turn = 1;
        const r = 42; 
        
        // Renk Tanımlamaları (null: Boş hücre, -1: Block, 0-3: Player Enerjileri)
        const colors = { 
            "null": '#1e1e1e',
            "-1": '#0a0a0a',
            "3": '#2ecc71', 
            "2": '#f1c40f', 
            "1": '#e74c3c', 
            "0": '#34495e' 
        };
        
        const textColors = { "3": '#000', "2": '#000', "1": '#fff', "0": '#fff', "-1": '#888' };

        // 6x3 Matris - Başlangıçta tamamen boş (null) ve yönsüz (0) olarak kuruluyor.
        let nodes = [];
        function initEmptyMap() {
            nodes = [];
            for (let i = 0; i < 18; i++) {
                nodes.push({ energy: null, yon: 0 }); 
            }
        }

        function resetSimulation() {
            turn = 1;
            initEmptyMap();
            renderMap();
        }

        function getCenter(col, row) {
            const w = r * Math.sqrt(3);
            const h = r * 2;
            let x = 90 + col * w;
            if (row % 2 === 1) x += w / 2;
            const y = 70 + row * (h * 3/4);
            return { x, y };
        }

        function drawHex(x, y, node) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i + (Math.PI / 6);
                const hX = x + r * Math.cos(angle);
                const hY = y + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(hX, hY);
                else ctx.lineTo(hX, hY);
            }
            ctx.closePath();

            // Enerji durumuna göre arka plan rengini bas
            let key = node.energy === null ? "null" : String(node.energy);
            ctx.fillStyle = colors[key];
            ctx.fill();

            // Genel kontur çizgisi
            ctx.strokeStyle = node.energy === -1 ? '#555' : '#333';
            ctx.lineWidth = node.energy === -1 ? 1 : 2;
            ctx.setLineDash([]);
            
            // Eğer aktif bir Player nodu ise ve yönü varsa dinamik çerçeve çiz
            if (node.energy !== null && node.energy !== -1) {
                if (node.yon === 1) {
                    ctx.strokeStyle = '#00e5ff'; // Yükselen Player'a Cyan çerçeve
                    ctx.lineWidth = 3;
                    ctx.setLineDash([4, 4]);
                } else if (node.yon === -1) {
                    ctx.strokeStyle = '#ff9100'; // Eriyen Player'a Turuncu çerçeve
                    ctx.lineWidth = 3;
                    ctx.setLineDash([4, 4]);
                }
            }
            ctx.stroke();

            // Metin Yazdırma Alanı
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (node.energy === -1) {
                // Block ise 'B' yaz
                ctx.fillStyle = textColors["-1"];
                ctx.fillText("B", x, y);
            } else if (node.energy !== null) {
                // Oyuncu ise 'P0, P1, P2, P3' yaz
                ctx.fillStyle = textColors[String(node.energy)];
                ctx.fillText("P" + node.energy, x, y);
            }
        }

        function renderMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    const idx = row * 6 + col;
                    const { x, y } = getCenter(col, row);
                    drawHex(x, y, nodes[idx]);
                }
            }
            document.getElementById('turn_val').innerText = turn;
        }

        // TIKLAMA MODU (Harita Editörü): Yolu ve tipi belirle
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mX = e.clientX - rect.left;
            const mY = e.clientY - rect.top;

            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 6; col++) {
                    const { x, y } = getCenter(col, row);
                    if (Math.hypot(mX - x, mY - y) < r * 0.85) {
                        const idx = row * 6 + col;
                        
                        // Döngüsel Seçim: null (Boş) -> P0 -> P1 -> P2 -> P3 -> B (-1 Block) -> Başa dön (null)
                        if (nodes[idx].energy === null) {
                            nodes[idx].energy = 0;
                            nodes[idx].yon = 1; // Sıfırdan başladığı için ilk yönü yükseliş olsun
                        } else if (nodes[idx].energy === 0) {
                            nodes[idx].energy = 1;
                            nodes[idx].yon = -1; // Ara değerler varsayılan erisin
                        } else if (nodes[idx].energy === 1) {
                            nodes[idx].energy = 2;
                            nodes[idx].yon = -1;
                        } else if (nodes[idx].energy === 2) {
                            nodes[idx].energy = 3;
                            nodes[idx].yon = -1; // 3 olunca bir sonraki turn düşecek
                        } else if (nodes[idx].energy === 3) {
                            nodes[idx].energy = -1; // Block moduna geçiş
                            nodes[idx].yon = 0;
                        } else if (nodes[idx].energy === -1) {
                            nodes[idx].energy = null; // Tekrar boş hücre yap
                            nodes[idx].yon = 0;
                        }
                        
                        renderMap();
                        return;
                    }
                }
            }
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // --- SIMÜLASYON MOTORU (SPACE & R) ---
        document.addEventListener('keydown', (e) => {
            // SPACE BAR: Turn Atlat ve dalgayı simüle et
            if (e.code === 'Space' || e.keyCode === 32) {
                e.preventDefault(); 
                turn++;

                for (let i = 0; i < nodes.length; i++) {
                    let node = nodes[i];

                    // Boş hücreler (null) veya Engeller (-1) turn akışından etkilenmez!
                    if (node.energy === null || node.energy === -1) {
                        continue;
                    }

                    // Aktif player nodelarının enerjisini yönüne göre değiştir
                    node.energy += node.yon;

                    // Sınır kontrolleri ve asenkron git-gel hafızası
                    if (node.energy >= 3) {
                        node.energy = 3;
                        node.yon = -1; // Maksimuma ulaşan erimeye başlar
                    } else if (node.energy <= 0) {
                        node.energy = 0;
                        node.yon = 1;  // Sıfıra vuran geri yükselir
                    }
                }
                renderMap();
            }

            // R TUŞU: Haritayı sıfırla
            if (e.code === 'KeyR' || e.keyCode === 82) {
                e.preventDefault();
                resetSimulation();
            }
        });

        // Doğrudan başlatma tetikleyicisi
        resetSimulation();
    </script>
</body>
</html>
